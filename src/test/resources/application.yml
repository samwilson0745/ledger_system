spring:
  datasource:
    url: jdbc:h2:mem:ledger;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

ledger:
  transfer:
    max-retries: 5
    retry-base-backoff-ms: 10
