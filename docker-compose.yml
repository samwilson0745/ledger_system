services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger-postgres
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5432:5432"
    volumes:
      - ledger-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: ledger-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ledger
      SPRING_DATASOURCE_USERNAME: ledger
      SPRING_DATASOURCE_PASSWORD: ledger
      LEDGER_AUTH_JWT_SECRET: ${LEDGER_AUTH_JWT_SECRET:-dev-only-secret-change-me-please-32chars-min}
      LEDGER_WEBHOOK_URL: http://app:8080/webhooks/test-receiver
      LEDGER_WEBHOOK_SECRET: ${LEDGER_WEBHOOK_SECRET:-dev-webhook-secret}
    ports:
      - "8080:8080"

volumes:
  ledger-pgdata:
